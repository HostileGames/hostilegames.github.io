<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostile Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f17;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 18px 40px;
    background: rgba(20,20,30,0.7);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 12px;
    opacity: 0.8;
}

nav a:hover { opacity: 1; }

/* HERO */
.hero {
    text-align: center;
    padding: 140px 20px;
}

.hero h1 {
    font-size: 4rem;
}

.hero p {
    color: #b6bcc8;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 28px;
    background: #00a8ff;
    color: white;
    text-decoration: none;
    border-radius: 10px;
}

/* GLOW */
.glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,168,255,0.25), transparent 60%);
    top: -150px;
    left: -150px;
    filter: blur(80px);
}
</style>
</head>

<body>

<div class="glow"></div>

<nav>
    <div><b>Hostile Games</b></div>

    <div>
        <a href="index.html">Home</a>
        <a href="downloads.html">Downloads</a>
        <a href="changelog.html">Changelog</a>

        <!-- GitHub preview -->
        <div style="display:inline-block; position:relative;">
            <a href="https://github.com/HostileGames" target="_blank">GitHub</a>
        </div>
    </div>
</nav>

<section class="hero">
    <h1>Hostile Games</h1>
    <p>Play. Enjoy. Share.</p>

    <a class="btn" href="downloads.html">Download preview</a>
</section>

</body>
</html>
